name: WebGPU Only Guards

on:
  pull_request:
  push:
    branches:
      - master
      - stable

jobs:
  webgpu-only-guards:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run WebGPU-only guard checks
        run: node scripts/check-webgpu-only.js
